name: CI - Lint & Test Shell Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find scripts/ -name "*.sh" -type f | while read -r script; do
            echo "Checking: $script"
            shellcheck -S warning "$script"
          done

  syntax:
    name: Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax
        run: make validate

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - uses: actions/checkout@v4

      - name: Setup scripts
        run: make setup

      - name: Run test suite
        run: make test

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: /tmp/health_check_logs/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          if grep -rE '(password|secret|key)\s*=\s*["\x27][^\x27"]+["\x27]' \
             scripts/ --include="*.sh" 2>/dev/null; then
            echo "WARNING: Potential hardcoded secrets found"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

      - name: Check for insecure practices
        run: |
          issues=0
          # Check for eval usage
          if grep -rn 'eval ' scripts/ --include="*.sh" 2>/dev/null; then
            echo "WARNING: eval usage found"
            issues=$((issues + 1))
          fi
          # Check for world-writable temp files
          if grep -rn 'chmod 777\|chmod a+w' scripts/ --include="*.sh"; then
            echo "WARNING: Insecure permissions found"
            issues=$((issues + 1))
          fi
          echo "Security check complete. Issues: $issues"
